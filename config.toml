# About 2 Section
[Languages.en.params.aboutSm]
enable  = true
title   = "FAQ"
description = """
What is the Pre-sale and listing price?
- The Pre-sale price will be $0.007
- Listing price will be $0.01. 

---------------------------------------- 

What is the listing date on Uniswap?
- The listing date is currently unknown, we are working on it to list as soon as possible. Please join our Official Twitter and Telegram channel for the latest announcements.

----------------------------------------

What is the total supply?
- The total supply constantly changes, we are working on it to be available to see it in the future.

----------------------------------------

Are team wallets locked?
- Since we truly believe in Equality, there is no Team and Developer allocation for this project.

----------------------------------------

Is Uniswap liquidity will be locked after the listing?
- Yes, we will lock the added liquidity via Unicrypt.

----------------------------------------

What is the Pre-Sale hard cap?
- The Pre-sale hard cap is currently undecided.

----------------------------------------
How do i know when to Buy and when to Sell?
- The EQUALITY targets the price between $0.01 - $1.
This means you buy close to 1 cent and sell close to 1 dollar.
"""

